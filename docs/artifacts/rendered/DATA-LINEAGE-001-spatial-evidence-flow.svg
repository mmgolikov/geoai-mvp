ight="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="240.0488" x="452.5" y="461.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="202.4121" x="462.5" y="484.292">Map feature / analysis target</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="220.0488" x="462.5" y="500.5889">status labels + dataset identity</text></g><!--entity Selection--><g class="entity" data-entity="Selection" data-source-line="13" data-uid="ent0008" id="entity_Selection"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="280.9346" x="6" y="353.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="120.3125" x="16" y="376.292">Selection lineage</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="260.9346" x="16" y="392.5889">providerFeatureId != sourceRecordId</text></g><!--entity Attribution--><g class="entity" data-entity="Attribution" data-source-line="14" data-uid="ent0009" id="entity_Attribution"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="258.7588" x="175" y="461.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="184.3926" x="185" y="484.292">Visible attribution payload</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="238.7588" x="185" y="500.5889">only visible layer/provider records</text></g><!--entity Evidence--><g class="entity" data-entity="Evidence" data-source-line="15" data-uid="ent0010" id="entity_Evidence"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="202.9775" x="203" y="551.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="182.2871" x="213" y="574.292">Analysis / 