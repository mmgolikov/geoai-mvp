<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="609px" preserveAspectRatio="none" style="width:1056px;height:609px;background:#FFFFFF;" version="1.1" viewBox="0 0 1056 609" width="1056px" zoomAndPan="magnify"><title>DATA-LINEAGE-001 &#8212; Spatial evidence identity, lineage and attribution</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="565.0586" x="241.7207" y="22.9951">DATA-LINEAGE-001 &#8212; Spatial evidence identity, lineage and attribution</text></g><!--entity Registry--><g class="entity" data-entity="Registry" data-source-line="7" data-uid="ent0002" id="entity_Registry"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="229.665" x="213.5" y="49.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="156.5361" x="223.5" y="72.292">Source registry record</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="209.665" x="223.5" y="88.5889">sourceId + terms + readiness</text></g><!--entity Dataset--><g class="entity" data-entity="Dataset" data-source-line="8" data-uid="ent0003" id="entity_Dataset"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="249.2773" x="204" y="139.2969"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="110.5508" x="214" y="162.292">Dataset version</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="229.2773" x="214" y="178.5889">datasetId + version + checksum</text></g><!--entity Feature--><g class="entity" data-entity="Feature" data-source-line="9" data-uid="ent0004" id="entity_Feature"><rect fill="#F1F1F1" height="68.8906" rx="2.5" ry="2.5" style="