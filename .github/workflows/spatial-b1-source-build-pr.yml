name: Spatial B1 Source Build Evidence

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/spatial-b1-source-build-pr.yml"
      - "scripts/spatial_b1/**"
      - "scripts/spatial-b1-contract-check.mjs"
      - "src/lib/spatial-b1/**"
      - "src/types/spatial-data-v1.ts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-spatial-evidence:
    name: Pinned source, geometry and determinism evidence
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      OSM_RELEASE: gcc-states-260712.osm.pbf
      OSM_URL: https://download.geofabrik.de/asia/gcc-states-260712.osm.pbf
      OSM_MD5_URL: https://download.geofabrik.de/asia/gcc-states-260712.osm.pbf.md5
      OSM_SNAPSHOT_DATE: "2026-07-12"
      OSM_SOURCE_TIMESTAMP: "2026-07-12T20:22:00Z"
      OVERTURE_RELEASE: "2026-06-17.0"
      DATASET_VERSION: "2026-07-13-b1.1"

    steps:
      - name: Checkout exact B1 head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install application and GIS dependencies
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends osmium-tool
          python -m pip install --disable-pip-version-check duckdb==1.3.2

      - name: Build pinned source and open geometry evidence
        run: scripts/spatial_b1/run_source_build_ci.sh

      - name: Record exact tested head
        run: printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > output/spatial-b1/evidence/tested-sha.txt

      - name: Upload B1 source and geometry evidence
        uses: actions/upload-artifact@v4
        with:
          name: spatial-b1-source-geometry-evidence-${{ github.run_id }}
          path: output/spatial-b1
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
