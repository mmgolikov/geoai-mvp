name: PR 63 Report Connector PDF Evidence

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read
  deployments: read

jobs:
  pdf-evidence:
    name: Physical Chromium PDF evidence
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      GEOAI_PDF_BASE_URL: http://127.0.0.1:3034
      GEOAI_PDF_OUTPUT_DIR: artifacts/pr63-report-connector-pdf-evidence
      GEOAI_PLAYWRIGHT_MODULE: /tmp/geoai-browser-runtime/node_modules/playwright/index.mjs
      GEOAI_TESTED_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout exact evidence head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve exact READY Preview metadata
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PREVIEW_URL=""
          PREVIEW_DEPLOYMENT_ID=""
          VERCEL_DEPLOYMENT_ID=""
          for attempt in $(seq 1 90); do
            PREVIEW_DEPLOYMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?sha=${HEAD_SHA}&per_page=10" --jq '[.[] | select(.environment == "Preview")][0].id // empty')
            if [ -n "$PREVIEW_DEPLOYMENT_ID" ]; then
              PREVIEW_URL=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${PREVIEW_DEPLOYMENT_ID}/statuses" --jq '[.[] | select(.state == "success")][0].environment_url // empty')
            fi
            INSPECTOR_URL=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/status" --jq '[.statuses[] | select(.context == "Vercel" and .state == "success")][0].target_url // empty')
            if [ -n "$PREVIEW_URL" ] && [ -n "$INSPECTOR_URL" ]; then
              VERCEL_DEPLOYMENT_ID="dpl_${INSPECTOR_URL##*/}"
              break
            fi
            sleep 5
          done
          test -n "$PREVIEW_URL"
          test -n "$PREVIEW_DEPLOYMENT_ID"
          test -n "$VERCEL_DEPLOYMENT_ID"
          echo "GEOAI_PREVIEW_URL=${PREVIEW_URL}" >> "$GITHUB_ENV"
          echo "GEOAI_GITHUB_DEPLOYMENT_ID=${PREVIEW_DEPLOYMENT_ID}" >> "$GITHUB_ENV"
          echo "GEOAI_PREVIEW_DEPLOYMENT_ID=${VERCEL_DEPLOYMENT_ID}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Verify connector wording contract
        run: node scripts/report-connector-readiness-wording-check.mjs

      - name: Build exact evidence head
        run: npm run build

      - name: Install isolated Chromium and PDF tools
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix /tmp/geoai-browser-runtime --no-save --no-package-lock playwright@1.55.0
          npx --prefix /tmp/geoai-browser-runtime playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Generate and audit physical PDFs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GEOAI_PDF_OUTPUT_DIR"
          npm run start -- -H 127.0.0.1 -p 3034 > "$GEOAI_PDF_OUTPUT_DIR/next-application.log" 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT
          READY=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3034/api/health > /dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat "$GEOAI_PDF_OUTPUT_DIR/next-application.log"
              exit 1
            fi
            sleep 1
          done
          test "$READY" -eq 1
          node scripts/pr63-report-connector-pdf-capture.mjs
          node scripts/pr63-report-connector-pdf-audit.mjs

      - name: Upload short-lived PDF evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr63-report-connector-pdf-evidence-${{ github.run_id }}
          path: artifacts/pr63-report-connector-pdf-evidence/
          if-no-files-found: error
          retention-days: 7
