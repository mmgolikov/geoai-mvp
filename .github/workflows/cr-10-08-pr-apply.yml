name: Sync CR 10.08 Quality Gate — PR

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  sync:
    if: github.head_ref == 'recovery/runtime-design-migration-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact Draft branch
        uses: actions/checkout@v4
        with:
          ref: recovery/runtime-design-migration-v1
          fetch-depth: 1
          show-progress: false

      - name: Apply and verify Quality Gate sync
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-cr-10-08-quality-workflow.py
          grep -F 'expected_status["/explore"]="307"' .github/workflows/geoai-quality-gate.yml
          grep -F 'expected_location["/explore"]="/workspace"' .github/workflows/geoai-quality-gate.yml
          grep -F 'lighthouse-desktop-workspace-criteria.json' .github/workflows/geoai-quality-gate.yml
          git diff --check

      - name: Commit and push Quality Gate sync
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/workflows/geoai-quality-gate.yml; then
            echo "Quality Gate sync is already present."
            exit 0
          fi
          git config user.name "GeoAI Delivery OS"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/geoai-quality-gate.yml
          git commit -m "ci: align Quality Gate with Workspace consolidation"
          git push origin HEAD:recovery/runtime-design-migration-v1
