name: Materialize CR 10.08 Quality Gate Blob — PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'recovery/runtime-design-migration-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact Draft branch
        uses: actions/checkout@v4
        with:
          ref: recovery/runtime-design-migration-v1
          fetch-depth: 1
          show-progress: false

      - name: Build verified Quality Gate candidate
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-cr-10-08-quality-workflow.py
          grep -F 'expected_status["/explore"]="307"' .github/workflows/geoai-quality-gate.yml
          grep -F 'expected_location["/explore"]="/workspace"' .github/workflows/geoai-quality-gate.yml
          grep -F 'lighthouse-desktop-workspace-criteria.json' .github/workflows/geoai-quality-gate.yml
          git diff --check
          mkdir -p docs/generated artifacts
          cp .github/workflows/geoai-quality-gate.yml docs/generated/CR_10_08_GEOAI_QUALITY_GATE.yml

      - name: Commit regular-file candidate blob
        shell: bash
        run: |
          set -euo pipefail
          git restore .github/workflows/geoai-quality-gate.yml
          git config user.name "GeoAI Delivery OS"
          git config user.email "actions@users.noreply.github.com"
          git add docs/generated/CR_10_08_GEOAI_QUALITY_GATE.yml
          if git diff --cached --quiet; then
            echo "Candidate blob already materialized."
          else
            git commit -m "chore: materialize verified Quality Gate candidate"
            git push origin HEAD:recovery/runtime-design-migration-v1
          fi
          git rev-parse HEAD | tee artifacts/materialized-head-sha.txt
          git rev-parse HEAD^{tree} | tee artifacts/materialized-tree-sha.txt

      - name: Export materialization receipt
        uses: actions/upload-artifact@v4
        with:
          name: cr-10-08-quality-materialization-${{ github.run_id }}
          path: |
            artifacts/materialized-head-sha.txt
            artifacts/materialized-tree-sha.txt
          if-no-files-found: error
          retention-days: 2
