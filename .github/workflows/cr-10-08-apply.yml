name: Apply CR 10.08 Workspace Consolidation

on:
  push:
    branches:
      - recovery/runtime-design-migration-v1
    paths:
      - .github/workflows/cr-10-08-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact Draft branch
        uses: actions/checkout@v4
        with:
          ref: recovery/runtime-design-migration-v1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply bounded CR 10.08 patch
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations
          import json
          import re
          from pathlib import Path

          root = Path.cwd()

          def read(path: str) -> str:
              return (root / path).read_text(encoding="utf-8")

          def write(path: str, content: str) -> None:
              (root / path).write_text(content, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              source = read(path)
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one occurrence, found {count}: {old[:120]!r}")
              write(path, source.replace(old, new, 1))

          def replace_all(path: str, old: str, new: str, minimum: int = 1) -> None:
              source = read(path)
              count = source.count(old)
              if count < minimum:
                  raise SystemExit(f"{path}: expected at least {minimum} occurrences, found {count}: {old[:120]!r}")
              write(path, source.replace(old, new))

          def regex_once(path: str, pattern: str, replacement: str, flags: int = 0) -> None:
              source = read(path)
              updated, count = re.subn(pattern, replacement, source, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{path}: regex expected one match, found {count}: {pattern}")
              write(path, updated)

          # Canonical routes: Workspace only; /explore is compatibility-only.
          write("app/explore/page.tsx", '''import { redirect } from "next/navigation";

export default function ExploreCompatibilityPage() {
  redirect("/workspace");
}
''')

          write("app/workspace/page.tsx", '''import type { Metadata } from "next";
import { AuthenticatedRouteGate } from "@/components/auth/authenticated-route-gate";
import { TopNavigation } from "@/components/top-navigation";
import { WorkspaceShell } from "@/components/workspace-shell";
import { createSpatialSourceRequest } from "@/src/lib/spatial-b2/source-mode";

export const metadata: Metadata = {
  title: "GeoAI Workspace",
  description: "Map-first and criteria-first spatial decision intelligence workspace."
};

type WorkspacePageProps = {
  searchParams?: Promise<{
    spatialMode?: string;
  }>;
};

export default async function WorkspacePage({ searchParams }: WorkspacePageProps) {
  const params = await searchParams;
  const spatialSourceRequest = createSpatialSourceRequest({
    requestedSourceMode: params?.spatialMode,
    vercelEnvironment: process.env.VERCEL_ENV,
    nodeEnvironment: process.env.NODE_ENV
  });

  return (
    <AuthenticatedRouteGate>
      <main className="flex min-h-screen flex-col bg-surface">
        <TopNavigation />
        <WorkspaceShell spatialSourceRequest={spatialSourceRequest} />
      </main>
    </AuthenticatedRouteGate>
  );
}
''')

          regex_once(
              "components/product-navigation.tsx",
              r'const productRoutes = \[.*?\] as const;',
              '''const productRoutes = [
  { href: "/workspace", label: "Workspace", description: "Screen, search and compare locations" },
  { href: "/projects", label: "Projects", description: "Open saved decision work" }
] as const;''',
              re.S,
          )

          replace_once("app/page.tsx", ">Explore platform</Link>", ">Open workspace</Link>")
          replace_once(
              "components/workspace-shell.tsx",
              'workspaceHeading={initialExploreMode ? "Explore candidate locations" : "Workspace location screening"}',
              'workspaceHeading="Workspace location screening"',
          )

          # Shared shell contract: two canonical destinations.
          replace_once(
              "tests/e2e/design-foundation-shell.spec.ts",
              'activeLabel?: "Workspace" | "Projects" | "Explore"',
              'activeLabel?: "Workspace" | "Projects"',
          )
          replace_all(
              "tests/e2e/design-foundation-shell.spec.ts",
              '["Workspace", "Projects", "Explore"]',
              '["Workspace", "Projects"]',
              minimum=2,
          )
          replace_once(
              "tests/e2e/design-foundation-shell.spec.ts",
              '      { href: "/explore", label: "Explore" as const },\n',
              '',
          )
          replace_once("tests/e2e/design-foundation-shell.spec.ts", "expect(evidence).toHaveLength(21);", "expect(evidence).toHaveLength(17);")

          # Mobile navigation: Workspace and Projects only; intentional new candidate evidence.
          nav_path = "tests/e2e/mobile-global-navigation.spec.ts"
          nav = read(nav_path)
          nav = re.sub(
              r'\n  await expect\(page\)\.toHaveScreenshot\(fileName, \{.*?\n  \}\);',
              '',
              nav,
              count=1,
              flags=re.S,
          )
          nav = nav.replace('    const exploreLink = navigation.getByRole("link", { name: /Explore/ });\n', '')
          nav = nav.replace('      ["Explore navigation link", exploreLink]\n', '')
          old_nav_sequence = '''    navigation = await openMobileNavigation(page);
    await expect(navigation.getByRole("link", { name: /Projects/ })).toHaveAttribute("aria-current", "page");
    await navigation.getByRole("link", { name: /Explore/ }).click();
    await expect(page).toHaveURL((url) => url.pathname === "/explore");
    await expect(page.getByRole("heading", { level: 1, name: "Explore candidate locations" })).toBeVisible();
    await expectNoHorizontalOverflow(page);

    navigation = await openMobileNavigation(page);
    await expect(navigation.getByRole("link", { name: /Explore/ })).toHaveAttribute("aria-current", "page");
'''
          new_nav_sequence = '''    navigation = await openMobileNavigation(page);
    await expect(navigation.getByRole("link", { name: /Projects/ })).toHaveAttribute("aria-current", "page");
    await expect(navigation.getByRole("link", { name: /Explore/ })).toHaveCount(0);
    await navigation.getByRole("link", { name: /Workspace/ }).click();
    await expect(page).toHaveURL((url) => url.pathname === "/workspace");
    await expect(page.getByRole("heading", { level: 1, name: "Workspace location screening" })).toBeVisible();
    await expectNoHorizontalOverflow(page);

    navigation = await openMobileNavigation(page);
    await expect(navigation.getByRole("link", { name: /Workspace/ })).toHaveAttribute("aria-current", "page");
    await expect(navigation.getByRole("link", { name: /Explore/ })).toHaveCount(0);
'''
          if nav.count(old_nav_sequence) != 1:
              raise SystemExit("mobile-global-navigation: route sequence did not match once")
          nav = nav.replace(old_nav_sequence, new_nav_sequence, 1)
          nav = nav.replace('      { href: "/explore", label: "Explore", heading: "Explore candidate locations" }\n', '')
          if 'name: /Explore/' not in nav:
              raise SystemExit("mobile-global-navigation: expected negative Explore assertions")
          write(nav_path, nav)

          # Criteria-first remains inside Workspace.
          replace_once(
              "tests/e2e/mobile-product-flow.spec.ts",
              'async function signInDemo(page: Page, nextPath: "/projects" | "/explore")',
              'async function signInDemo(page: Page, nextPath: "/projects" | "/workspace")',
          )
          replace_once(
              "tests/e2e/mobile-product-flow.spec.ts",
              'await captureVisualEvidence(page, "Mobile project hub", "mobile-project-hub.png", { fullPage: true });',
              'await captureVisualEvidence(page, "Mobile project hub", "mobile-project-hub.png", { candidateBaseline: true, fullPage: true });',
          )
          replace_once("tests/e2e/mobile-product-flow.spec.ts", 'await signInDemo(page, "/explore");', 'await signInDemo(page, "/workspace");')
          replace_once(
              "tests/e2e/mobile-product-flow.spec.ts",
              'await captureVisualEvidence(page, "Mobile explore setup", "mobile-explore-setup.png", { candidateBaseline: true });',
              'await captureVisualEvidence(page, "Mobile Workspace criteria-first setup", "mobile-workspace-criteria-setup.png", { candidateBaseline: true });',
          )

          replace_once(
              "tests/e2e/accessibility-project-comparison-flow.spec.ts",
              'async function signInDemoWithKeyboard(page: Page, nextPath: "/projects" | "/explore")',
              'async function signInDemoWithKeyboard(page: Page, nextPath: "/projects" | "/workspace")',
          )
          replace_once(
              "tests/e2e/accessibility-project-comparison-flow.spec.ts",
              'await signInDemoWithKeyboard(page, "/explore");',
              'await signInDemoWithKeyboard(page, "/workspace");',
          )
          replace_once(
              "tests/e2e/accessibility-project-comparison-flow.spec.ts",
              'await recordAccessibilityResult(page, "Explore setup");',
              'await recordAccessibilityResult(page, "Workspace criteria-first setup");',
          )

          # Auth journey proves the compatibility redirect rather than a third Product route.
          replace_once(
              "tests/e2e/auth-session-flow.spec.ts",
              '''    for (const route of ["/projects", "/explore"]) {
      await page.goto(route);
      await expect(page).toHaveURL((url) => url.pathname === route);
      await expectAuthenticatedProfileControl(page);
    }
''',
              '''    await page.goto("/projects");
    await expect(page).toHaveURL((url) => url.pathname === "/projects");
    await expectAuthenticatedProfileControl(page);

    await page.goto("/explore");
    await expect(page).toHaveURL((url) => url.pathname === "/workspace");
    await expectAuthenticatedProfileControl(page);
''',
          )

          # Recovery authority now includes CR 10.08.
          replace_once(
              "tests/e2e/route-body-invariance.spec.ts",
              '    "CR-10.07"\n  ]);',
              '    "CR-10.07",\n    "CR-10.08"\n  ]);',
          )

          # Dedicated consolidation contract.
          write("tests/e2e/workspace-consolidation.spec.ts", '''import fs from "node:fs/promises";
import path from "node:path";
import { expect, test, type Page } from "@playwright/test";

const evidencePath = path.join(process.cwd(), "artifacts", "workspace-consolidation.json");

async function signInDemo(page: Page) {
  await page.goto("/login?next=/workspace&intent=demo");
  const redirected = await page.waitForURL((url) => url.pathname === "/workspace", { timeout: 3000 }).then(() => true, () => false);
  if (!redirected) {
    await page.getByRole("button", { name: "Use demo credentials" }).click();
    await page.getByRole("button", { name: "Open demo" }).click();
  }
  await expect(page).toHaveURL((url) => url.pathname === "/workspace");
}

async function writeEvidence(payload: Record<string, unknown>) {
  await fs.mkdir(path.dirname(evidencePath), { recursive: true });
  await fs.writeFile(evidencePath, `${JSON.stringify(payload, null, 2)}\n`, "utf8");
}

test("uses Workspace as the only visible Product destination and preserves criteria-first", async ({ page }) => {
  await page.setViewportSize({ width: 1440, height: 900 });
  await signInDemo(page);

  const navigation = page.getByRole("navigation", { name: "Primary product navigation" });
  await expect(navigation).toBeVisible();
  await expect(navigation.getByRole("link", { name: "Workspace", exact: true })).toHaveAttribute("aria-current", "page");
  await expect(navigation.getByRole("link", { name: "Projects", exact: true })).toBeVisible();
  await expect(navigation.getByRole("link", { name: "Explore", exact: true })).toHaveCount(0);
  await expect(page.getByRole("heading", { level: 1, name: "Workspace location screening" })).toBeVisible();

  const criteriaFirst = page.getByRole("button", { name: "Criteria-first" });
  await criteriaFirst.click();
  await expect(criteriaFirst).toHaveAttribute("aria-pressed", "true");
  await page.getByRole("button", { name: "Find redevelopment zones" }).click();
  const compareCandidates = page.getByRole("button", { name: "Compare Candidates" });
  await expect(compareCandidates).toBeEnabled();
  await compareCandidates.click();
  await expect(page.locator("section[data-dashboard-comparison-id]")).toBeVisible();

  await page.goto("/explore");
  await expect(page).toHaveURL((url) => url.pathname === "/workspace");
  await expect(page.getByRole("heading", { level: 1, name: "Workspace location screening" })).toBeVisible();

  await page.setViewportSize({ width: 390, height: 844 });
  const trigger = page.getByRole("button", { name: "Open product navigation" });
  await trigger.click();
  const mobileNavigation = page.getByRole("navigation", { name: "Mobile product navigation" });
  await expect(mobileNavigation.getByRole("link", { name: /Workspace/ })).toBeVisible();
  await expect(mobileNavigation.getByRole("link", { name: /Projects/ })).toBeVisible();
  await expect(mobileNavigation.getByRole("link", { name: /Explore/ })).toHaveCount(0);

  await writeEvidence({
    schemaVersion: "1.0",
    canonicalProductRoute: "/workspace",
    compatibilityRoute: "/explore",
    compatibilityDestination: "/workspace",
    visibleProductDestinations: ["Workspace", "Projects"],
    criteriaFirstPreserved: true,
    comparisonPreserved: true,
    checkedAt: new Date().toISOString()
  });
});
''')

          # Focused E2E command and static wiring contract.
          package_path = "package.json"
          package = json.loads(read(package_path))
          old_command = package["scripts"]["test:e2e:auth-session"]
          new_spec = " tests/e2e/workspace-consolidation.spec.ts"
          if "workspace-consolidation.spec.ts" not in old_command:
              package["scripts"]["test:e2e:auth-session"] = old_command + new_spec
          old_lighthouse = "artifacts/lighthouse-desktop-explore.json"
          new_lighthouse = "artifacts/lighthouse-desktop-workspace-criteria.json"
          package["scripts"]["test:lighthouse-budget"] = package["scripts"]["test:lighthouse-budget"].replace(old_lighthouse, new_lighthouse)
          write(package_path, json.dumps(package, indent=2, ensure_ascii=False) + "\n")

          auth_contract = "scripts/auth-session-e2e-contract-check.mjs"
          source = read(auth_contract)
          source = source.replace(
              'const systemResilienceSpec = read("tests/e2e/system-resilience-flow.spec.ts");',
              'const systemResilienceSpec = read("tests/e2e/system-resilience-flow.spec.ts");\nconst workspaceConsolidationSpec = read("tests/e2e/workspace-consolidation.spec.ts");',
          )
          source = source.replace(
              'tests/e2e/route-body-invariance.spec.ts")',
              'tests/e2e/route-body-invariance.spec.ts tests/e2e/workspace-consolidation.spec.ts")',
          )
          source = source.replace('artifacts/lighthouse-desktop-explore.json', 'artifacts/lighthouse-desktop-workspace-criteria.json')
          source = source.replace('signInDemoWithKeyboard(page, "/explore")', 'signInDemoWithKeyboard(page, "/workspace")')
          source = source.replace('"mobile-explore-setup.png"', '"mobile-workspace-criteria-setup.png"')
          source = source.replace('  "toHaveScreenshot",\n  "maxDiffPixelRatio: 0.01",\n', '  "candidateBaseline",\n')
          source = source.replace('  \'name: /Explore/\',\n', '  "toHaveCount(0)",\n')
          source = source.replace('  \'href: "/explore"\',\n', '')
          source = source.replace('for (const route of ["/workspace?segment=b2b", "/projects", "/explore", "/profile"])', 'for (const route of ["/workspace?segment=b2b", "/projects", "/explore", "/profile"])')
          insertion = '''
for (const marker of [
  'canonicalProductRoute: "/workspace"',
  'compatibilityRoute: "/explore"',
  'name: "Criteria-first"',
  'name: "Compare Candidates"',
  'name: /Explore/'
]) requireText(workspaceConsolidationSpec, marker, `Workspace consolidation flow is missing ${marker}`);
if (!workspaceConsolidationSpec.includes("toHaveCount(0)")) failures.push("Workspace consolidation must assert that Explore is absent from visible navigation");
if (productNavigation.includes('href: "/explore"') || productNavigation.includes('label: "Explore"')) failures.push("Explore must not remain a visible Product navigation destination");
'''
          anchor = 'for (const marker of [\n  "lighthouse-budget-summary.json",'
          if source.count(anchor) != 1:
              raise SystemExit("auth-session contract: Lighthouse anchor missing")
          source = source.replace(anchor, insertion + "\n" + anchor, 1)
          write(auth_contract, source)

          # Foundation contract follows the approved two-destination Product IA.
          replace_once(
              "scripts/design-foundation-contract-check.mjs",
              'for (const href of ["/workspace", "/projects", "/explore"]) expect(navigation.includes(`href: "${href}"`), `Missing ${href} navigation.`);',
              'for (const href of ["/workspace", "/projects"]) expect(navigation.includes(`href: "${href}"`), `Missing ${href} navigation.`);\nexpect(!navigation.includes(\'href: "/explore"\') && !navigation.includes(\'label: "Explore"\'), "Explore must not remain a canonical Product navigation destination.");',
          )

          # Lighthouse and built-route evidence now target canonical Workspace.
          lighthouse_path = "scripts/lighthouse-budget-check.mjs"
          replace_all(lighthouse_path, "artifacts/lighthouse-desktop-explore.json", "artifacts/lighthouse-desktop-workspace-criteria.json")
          replace_once(
              lighthouse_path,
              '{ file: inputs[3], name: "desktop-explore", expectedPath: "/explore",',
              '{ file: inputs[3], name: "desktop-workspace-criteria", expectedPath: "/workspace",',
          )

          workflow_path = ".github/workflows/geoai-quality-gate.yml"
          workflow = read(workflow_path)
          workflow = workflow.replace("artifacts/lighthouse-desktop-explore.json", "artifacts/lighthouse-desktop-workspace-criteria.json")
          workflow = workflow.replace("npx lighthouse http://127.0.0.1:3000/explore \\", "npx lighthouse http://127.0.0.1:3000/workspace \\")
          smoke_anchor = '          expected_status["/demo"]="307"\n'
          if workflow.count(smoke_anchor) != 1:
              raise SystemExit("quality workflow: smoke status anchor missing")
          workflow = workflow.replace(smoke_anchor, smoke_anchor + '          expected_status["/explore"]="307"\n', 1)
          location_anchor = '          expected_location["/demo"]="/workspace"\n'
          if workflow.count(location_anchor) != 1:
              raise SystemExit("quality workflow: redirect location anchor missing")
          workflow = workflow.replace(location_anchor, location_anchor + '          expected_location["/explore"]="/workspace"\n', 1)
          write(workflow_path, workflow)

          # Documentation follows the final canonical route decision.
          cr_path = "docs/WORKSPACE_CONSOLIDATION_CR_10_08_2026_07_23.md"
          cr = read(cr_path)
          cr = cr.replace("`/workspace?mode=explore`", "`/workspace`")
          cr = cr.replace("The screen heading remains `Workspace location screening` in both default and criteria-first entry states.", "The screen heading remains `Workspace location screening`; criteria-first is selected inside the same route.")
          cr = cr.replace("`/workspace` | Canonical Workspace state | Criteria-first initial setup inside Workspace |\n", "")
          cr = cr.replace("`/explore` | Compatibility-only | Forward legacy links to canonical Workspace state |", "`/explore` | Compatibility-only | Forward legacy links to `/workspace` |")
          cr = cr.replace("`/workspace` opens Workspace with criteria-first setup available and the heading", "Criteria-first can be selected directly inside `/workspace`, with the heading")
          write(cr_path, cr)

          program_path = "docs/RUNTIME_DESIGN_RECOVERY_PROGRAM_2026_07_22.json"
          program = json.loads(read(program_path))
          for item in program["changeRequests"]:
              if item["id"] == "CR-10.04":
                  item["affectedRoutes"] = ["/workspace", "/explore compatibility entry"]
              if item["id"] == "CR-10.08":
                  item["affectedRoutes"] = ["/", "/workspace", "/projects", "/explore compatibility entry"]
                  item["acceptance"] = [
                      "No visible Explore Product navigation item exists on desktop, tablet or mobile.",
                      "Landing contains no Explore platform CTA.",
                      "Workspace is the only visible operating surface for map-first and criteria-first workflows.",
                      "Criteria-first candidate search, comparison, dashboard and export work from /workspace.",
                      "/explore is compatibility-only and forwards users to /workspace.",
                      "Workspace heading remains Workspace location screening in all interaction states.",
                      "Shared-shell accessibility, target-size, focus and overflow checks remain green."
                  ]
          write(program_path, json.dumps(program, indent=2, ensure_ascii=False) + "\n")

          # Active runtime/UI assertions.
          product_navigation = read("components/product-navigation.tsx")
          if 'href: "/explore"' in product_navigation or 'label: "Explore"' in product_navigation:
              raise SystemExit("Explore still exists in ProductNavigation")
          if "Explore platform" in read("app/page.tsx"):
              raise SystemExit("Landing still contains Explore platform")
          if "WorkspaceShell" in read("app/explore/page.tsx"):
              raise SystemExit("/explore still renders duplicate WorkspaceShell")
          if 'redirect("/workspace")' not in read("app/explore/page.tsx"):
              raise SystemExit("/explore compatibility redirect is missing")
          if 'workspaceHeading="Workspace location screening"' not in read("components/workspace-shell.tsx"):
              raise SystemExit("Workspace heading was not normalized")

          print("CR 10.08 bounded patch applied.")
          PY

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Design foundation contract
        run: npm run test:design-foundation

      - name: Auth and browser wiring contract
        run: npm run test:auth-session-e2e-contract

      - name: Data honesty contract
        run: npm run test:data-honesty

      - name: Diff integrity
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short
          echo "Visible Explore references in active app/components after consolidation (expected: compatibility/internal identifiers only):"
          git grep -n -E 'Explore platform|Explore candidate locations|label: "Explore"|href: "/explore"' -- app components || true

      - name: Commit and push implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "GeoAI Delivery OS"
          git config user.email "actions@users.noreply.github.com"
          git add \
            app/explore/page.tsx \
            app/workspace/page.tsx \
            app/page.tsx \
            components/product-navigation.tsx \
            components/workspace-shell.tsx \
            tests/e2e/auth-session-flow.spec.ts \
            tests/e2e/accessibility-project-comparison-flow.spec.ts \
            tests/e2e/design-foundation-shell.spec.ts \
            tests/e2e/mobile-global-navigation.spec.ts \
            tests/e2e/mobile-product-flow.spec.ts \
            tests/e2e/route-body-invariance.spec.ts \
            tests/e2e/workspace-consolidation.spec.ts \
            scripts/auth-session-e2e-contract-check.mjs \
            scripts/design-foundation-contract-check.mjs \
            scripts/lighthouse-budget-check.mjs \
            package.json \
            .github/workflows/geoai-quality-gate.yml \
            docs/WORKSPACE_CONSOLIDATION_CR_10_08_2026_07_23.md \
            docs/RUNTIME_DESIGN_RECOVERY_PROGRAM_2026_07_22.json
          git commit -m "feat: consolidate candidate search into Workspace"
          git push origin HEAD:recovery/runtime-design-migration-v1
