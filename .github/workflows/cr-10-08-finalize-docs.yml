name: Finalize CR 10.08 Documentation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'recovery/runtime-design-migration-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Draft branch
        uses: actions/checkout@v4
        with:
          ref: recovery/runtime-design-migration-v1
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify source guard and regenerate lifecycle manifest
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          {
            npm ci &&
            npm run test:workspace-consolidation-source &&
            npm run docs:lifecycle:generate &&
            npm run test:document-lifecycle &&
            npm run lint &&
            git diff --check
          } > artifacts/cr-10-08-finalize.log 2>&1
          status=$?
          cat artifacts/cr-10-08-finalize.log
          exit "$status"

      - name: Upload finalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cr-10-08-finalize-diagnostic-${{ github.run_id }}
          path: |
            artifacts/cr-10-08-finalize.log
            artifacts/workspace-consolidation-source-check.json
          if-no-files-found: warn
          retention-days: 2

      - name: Fail when finalization verification did not pass
        if: steps.verify.outcome == 'failure'
        run: exit 1

      - name: Commit generated documentation state
        if: steps.verify.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "GeoAI Delivery OS"
          git config user.email "actions@users.noreply.github.com"
          git add docs/DOCUMENT_LIFECYCLE_MANIFEST.json docs/DOCUMENT_ARCHIVE_INDEX.md
          if git diff --cached --quiet; then
            echo "Lifecycle documents are already current."
            exit 0
          fi
          git commit -m "docs: synchronize CR 10.08 lifecycle manifest"
          git push origin HEAD:recovery/runtime-design-migration-v1
