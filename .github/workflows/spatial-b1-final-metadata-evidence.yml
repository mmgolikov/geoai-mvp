name: Spatial B1 Final Metadata and Attribution Evidence

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/spatial-b1-final-metadata-evidence.yml"
      - "scripts/spatial_b1/**"
      - "scripts/spatial-b1-contract-check.mjs"
      - "src/lib/spatial-b1/**"
      - "src/types/spatial-data-v1.ts"
      - "docs/SPATIAL_B1_ATTRIBUTION_AND_DISTRIBUTION_SPEC_V1.md"
      - "docs/SPATIAL_B1_EXECUTION_PLAN_V1.md"
      - "docs/SPATIAL_B1_RELEASE_CONTROL_V1.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-spatial-evidence:
    name: Final metadata, attribution and review evidence
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      OSM_RELEASE: gcc-states-260712.osm.pbf
      OSM_URL: https://download.geofabrik.de/asia/gcc-states-260712.osm.pbf
      OSM_MD5_URL: https://download.geofabrik.de/asia/gcc-states-260712.osm.pbf.md5
      OSM_SNAPSHOT_DATE: "2026-07-12"
      OSM_SOURCE_TIMESTAMP: "2026-07-12T20:22:00Z"
      OVERTURE_RELEASE: "2026-06-17.0"
      DATASET_VERSION: "2026-07-14-b1.3"

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install application and pinned GIS dependencies
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends osmium-tool
          python -m pip install --disable-pip-version-check -r scripts/spatial_b1/requirements.txt

      - name: Build final read-only B1 evidence
        run: scripts/spatial_b1/run_source_build_ci.sh

      - name: Record exact workflow context
        run: |
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > output/spatial-b1/evidence/tested-sha.txt
          printf '%s\n' "${{ github.run_id }}" > output/spatial-b1/evidence/workflow-run-id.txt
          printf '%s\n' "${{ github.job }}" > output/spatial-b1/evidence/workflow-job-key.txt
          printf '%s\n' "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > output/spatial-b1/evidence/workflow-run-url.txt

      - name: Upload short-lived final B1 evidence
        uses: actions/upload-artifact@v4
        with:
          name: spatial-b1-final-metadata-attribution-evidence-${{ github.run_id }}
          path: output/spatial-b1
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
