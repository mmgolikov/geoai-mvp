name: Apply Project Hub Runtime Status Patch

on:
  push:
    branches:
      - dev6-project-hub-runtime-status-v1

permissions:
  contents: write

concurrency:
  group: project-hub-status-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: dev6-project-hub-runtime-status-v1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply controlled source patch
        run: node scripts/patch-project-dashboard-runtime-status.mjs

      - name: Commit patched component when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- components/project-dashboard/project-dashboard.tsx; then
            echo "Project Dashboard already matches the canonical runtime-status contract."
            exit 0
          fi
          git config user.name "geoai-delivery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add components/project-dashboard/project-dashboard.tsx
          git commit -m "Apply canonical Project Hub runtime status contract"
          git push origin HEAD:dev6-project-hub-runtime-status-v1
