name: Temporary CR-DEV7-001 Responsive Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cr-dev7-001-responsive-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  responsive-evidence:
    name: Capture 17 responsive states
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      CR_DEV7_EVIDENCE_DIR: artifacts/cr-dev7-001
      CR_DEV7_TESTED_COMMIT_SHA: 29c5b9f004e0cf65fddf7c23f846391ae87ad29d
      CR_DEV7_PREVIEW_DEPLOYMENT_ID: dpl_AMHpfFKANw28pQqccBaWXDeS22J5
      CR_DEV7_PREVIEW_URL: https://geoai-gy2si2w0p-geoaidev.vercel.app

    steps:
      - name: Checkout temporary evidence harness
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install application and Chromium
        run: |
          npm ci
          npm install --no-save --ignore-scripts playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capture exact-Preview responsive evidence
        run: node scripts/cr-dev7-001-responsive-evidence.mjs

      - name: Package immutable evidence ZIP
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/package
          if [ -d artifacts/cr-dev7-001 ]; then
            (
              cd artifacts/cr-dev7-001
              find . -type f -print0 | LC_ALL=C sort -z | xargs -0 zip -X ../package/cr-dev7-001-responsive-evidence.zip
            )
            cp artifacts/cr-dev7-001/cr-dev7-001-evidence-manifest.json artifacts/package/
            sha256sum artifacts/package/cr-dev7-001-responsive-evidence.zip > artifacts/package/cr-dev7-001-responsive-evidence.zip.sha256
          fi

      - name: Upload short-lived immutable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cr-dev7-001-responsive-evidence-${{ github.run_id }}
          path: artifacts/package/
          if-no-files-found: error
          retention-days: 14
