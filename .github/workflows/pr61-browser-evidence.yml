name: PR 61 Browser Evidence v1.1

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  deployments: read

jobs:
  browser-evidence:
    name: Read-only browser evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      GEOAI_EVIDENCE_BASE_URL: http://127.0.0.1:3034
      GEOAI_EVIDENCE_DIR: artifacts/pr61-browser-evidence
      GEOAI_PLAYWRIGHT_MODULE: /tmp/geoai-browser-runtime/node_modules/playwright/index.mjs
      GEOAI_TESTED_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout evidence commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve exact READY Preview
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PREVIEW_URL=""
          DEPLOYMENT_ID=""

          for attempt in $(seq 1 60); do
            GH_DEPLOYMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?sha=${HEAD_SHA}&per_page=10" --jq '[.[] | select(.environment == "Preview")][0].id // empty')
            if [ -n "$GH_DEPLOYMENT_ID" ]; then
              PREVIEW_URL=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${GH_DEPLOYMENT_ID}/statuses" --jq '[.[] | select(.state == "success")][0].environment_url // empty')
            fi
            INSPECTOR_URL=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/status" --jq '[.statuses[] | select(.context == "Vercel" and .state == "success")][0].target_url // empty')
            if [ -n "$PREVIEW_URL" ] && [ -n "$INSPECTOR_URL" ]; then
              DEPLOYMENT_ID="dpl_${INSPECTOR_URL##*/}"
              break
            fi
            sleep 5
          done

          if [ -z "$PREVIEW_URL" ] || [ -z "$DEPLOYMENT_ID" ]; then
            echo "A READY Preview was not resolved for ${HEAD_SHA}." >&2
            exit 1
          fi

          echo "GEOAI_PREVIEW_URL=${PREVIEW_URL}" >> "$GITHUB_ENV"
          echo "GEOAI_PREVIEW_DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install isolated browser runtime
        run: |
          npm install --prefix /tmp/geoai-browser-runtime --no-save --no-package-lock playwright@1.55.0
          npx --prefix /tmp/geoai-browser-runtime playwright install --with-deps chromium

      - name: Run bounded browser assertions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/pr61-browser-evidence
          npm run start -- -H 127.0.0.1 -p 3034 > artifacts/pr61-browser-evidence/next-application.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT

          READY=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3034/api/health > /dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat artifacts/pr61-browser-evidence/next-application.log
              exit 1
            fi
            sleep 1
          done

          if [ "$READY" -ne 1 ]; then
            cat artifacts/pr61-browser-evidence/next-application.log
            echo "Built app did not become ready within 60 seconds." >&2
            exit 1
          fi

          node scripts/pr61-browser-evidence.mjs

      - name: Upload short-lived browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr61-v11-browser-evidence-${{ github.run_id }}
          path: artifacts/pr61-browser-evidence/
          if-no-files-found: error
          retention-days: 7
