name: Apply Project Hub Loading State

on:
  push:
    branches:
      - dev6-project-hub-runtime-status-v1

permissions:
  contents: write

concurrency:
  group: project-hub-loading-state-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-loading-state:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: dev6-project-hub-runtime-status-v1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply loading-state patch
        run: node scripts/patch-project-hub-loading-state.mjs

      - name: Commit patch when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- components/project-dashboard/project-dashboard.tsx; then
            echo "Loading state already normalized."
            exit 0
          fi
          git config user.name "geoai-delivery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add components/project-dashboard/project-dashboard.tsx
          git commit -m "Use neutral Project Hub runtime loading state"
          git push origin HEAD:dev6-project-hub-runtime-status-v1
