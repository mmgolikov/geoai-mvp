name: Align CR 10.08 Spatial Contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'recovery/runtime-design-migration-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Draft branch
        uses: actions/checkout@v4
        with:
          ref: recovery/runtime-design-migration-v1
          fetch-depth: 1
          show-progress: false

      - name: Apply bounded contract patch
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path("scripts/spatial-b2-integration-check.mjs")
          source = path.read_text(encoding="utf-8")
          old = 'assert(explorePage.includes("createSpatialSourceRequest") && explorePage.includes("spatialSourceRequest={spatialSourceRequest}"), "Explore source request must be resolved and wired on the server");'
          new = 'assert(explorePage.includes(\'redirect("/workspace")\') && !explorePage.includes("WorkspaceShell"), "Explore compatibility entry must redirect to canonical Workspace without duplicating the spatial shell");'
          if new in source:
              print("Spatial contract already aligned.")
          else:
              if source.count(old) != 1:
                  raise SystemExit(f"Expected one legacy Explore assertion, found {source.count(old)}")
              path.write_text(source.replace(old, new, 1), encoding="utf-8")
              print("Spatial contract aligned.")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Spatial B2A contract
        run: |
          set -euo pipefail
          npm ci
          npm run test:spatial-b2a
          git diff --check

      - name: Commit and push contract alignment
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/spatial-b2-integration-check.mjs; then
            echo "No source update required."
            exit 0
          fi
          git config user.name "GeoAI Delivery OS"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/spatial-b2-integration-check.mjs
          git commit -m "test: align Spatial B2A with Workspace consolidation"
          git push origin HEAD:recovery/runtime-design-migration-v1
