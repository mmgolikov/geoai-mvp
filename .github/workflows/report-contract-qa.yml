name: Report Contract QA

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: report-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Report source contract
        run: node scripts/report-contract-source-check.mjs

      - name: Build
        run: npm run build

      - name: Print route smoke and HTML contract
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/report-contract
          npm run start -- -H 127.0.0.1 -p 3000 > /tmp/geoai-report-next.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT

          READY=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat /tmp/geoai-report-next.log
              exit 1
            fi
            sleep 1
          done
          test "$READY" -eq 1

          ANALYSIS_URL=http://127.0.0.1:3000/reports/seeded-analysis-dubai-marina-report/print
          COMPARISON_URL=http://127.0.0.1:3000/reports/seeded-comparison-dubai-shortlist-report/print
          curl --fail --silent --show-error "$ANALYSIS_URL" > artifacts/report-contract/analysis.html
          curl --fail --silent --show-error "$COMPARISON_URL" > artifacts/report-contract/comparison.html

          grep -q "Investment Site Selection" artifacts/report-contract/analysis.html
          grep -q "Saved report timestamp" artifacts/report-contract/analysis.html
          grep -q "Demo screening posture" artifacts/report-contract/analysis.html
          grep -q "Schematic Map Context" artifacts/report-contract/analysis.html
          grep -q "Demo deterministic score" artifacts/report-contract/analysis.html
          grep -q "manual import path available; no verified snapshot attached" artifacts/report-contract/analysis.html
          grep -q "Review-ready screening memo preview" artifacts/report-contract/analysis.html

          grep -q "Saved report timestamp" artifacts/report-contract/comparison.html
          grep -q "Demo screening preference" artifacts/report-contract/comparison.html
          grep -q "Schematic Comparison Context" artifacts/report-contract/comparison.html
          grep -q "Demo deterministic score" artifacts/report-contract/comparison.html

          cp /tmp/geoai-report-next.log artifacts/report-contract/next-runtime.log

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-contract-${{ github.run_id }}
          path: artifacts/report-contract/
          if-no-files-found: warn
          retention-days: 14
