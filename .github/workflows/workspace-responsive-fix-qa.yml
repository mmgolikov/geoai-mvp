name: Workspace Responsive Fix QA

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-responsive-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Workspace source regression
        run: npm run test:workspace-panel

      - name: Build
        run: npm run build

      - name: Run focused browser regression
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/workspace-responsive-fix
          CHROME_BIN="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome/Chromium executable was not found." >&2
            exit 1
          fi
          export CHROME_BIN

          npm run start -- -H 127.0.0.1 -p 3000 > /tmp/geoai-workspace-fix-next.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat /tmp/geoai-workspace-fix-next.log
              exit 1
            fi
            sleep 1
          done

          GEOAI_TEST_BASE_URL=http://127.0.0.1:3000 node scripts/workspace-responsive-browser-check.mjs
          cp /tmp/geoai-workspace-fix-next.log artifacts/workspace-responsive-fix/next-runtime.log

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-responsive-fix-${{ github.run_id }}
          path: artifacts/workspace-responsive-fix/
          if-no-files-found: warn
          retention-days: 14
